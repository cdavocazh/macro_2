# /etc/nginx/sites-available/macro-dash
# Nginx reverse proxy for the Dash dashboard.
#
# Install:
#   sudo cp deploy/nginx-macro-dash.conf /etc/nginx/sites-available/macro-dash
#   sudo ln -sf /etc/nginx/sites-available/macro-dash /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# For HTTPS, uncomment the SSL block and run:
#   sudo certbot --nginx -d macro.yourdomain.com

# Rate limiting — prevent abuse
limit_req_zone $binary_remote_addr zone=dash:10m rate=10r/s;

server {
    listen 80;
    server_name _;   # Replace with your domain: macro.yourdomain.com

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Static assets — served directly by Nginx (fast)
    location /assets/ {
        alias /opt/macro_2/dash_dashboard/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Dash component suites (JS/CSS bundles) — long cache
    location /_dash-component-suites/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
    }

    # Main app — reverse proxy to Gunicorn
    location / {
        limit_req zone=dash burst=20 nodelay;

        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for slow callbacks (financial data fetch)
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8050/;
        access_log off;
    }

    # Block common scanners
    location ~ /\. { deny all; }
    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin) { return 444; }

    # Access log
    access_log /var/log/nginx/macro-dash.access.log;
    error_log  /var/log/nginx/macro-dash.error.log;
}

