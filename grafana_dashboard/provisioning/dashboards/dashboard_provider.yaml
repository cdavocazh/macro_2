# Grafana dashboard provisioning — auto-load dashboards from /var/lib/grafana/dashboards
apiVersion: 1

providers:
  - name: "Macro Dashboard"
    orgId: 1
    folder: "Macro"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
